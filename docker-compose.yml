services:
  db:
    image: postgres:16-alpine
    container_name: bgr-brain-db
    environment:
      POSTGRES_USER: bgr
      POSTGRES_PASSWORD: bgrsecret
      POSTGRES_DB: bgrbrain
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgr -d bgrbrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Production: derlenmiş Next.js sunucusu (hızlı). Günlük kullanım için bu.
  # Geliştirme (canlı yeniden yükleme) için: docker-compose.dev.yml override'ını ekleyin.
  app:
    build: ./frontend
    container_name: bgr-brain-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bgr:bgrsecret@db:5432/bgrbrain?schema=public
      JWT_SECRET: change-me-in-production-9f8a7b6c5d4e
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pgdata:
  node_modules:
  next_cache:
