services:
  db:
    image: postgres:16-alpine
    container_name: bgr-brain-db
    environment:
      POSTGRES_USER: bgr
      POSTGRES_PASSWORD: bgrsecret
      POSTGRES_DB: bgrbrain
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgr -d bgrbrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./frontend
    container_name: bgr-brain-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bgr:bgrsecret@db:5432/bgrbrain?schema=public
      JWT_SECRET: change-me-in-production-9f8a7b6c5d4e
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: sh -c "npm install && npx prisma db push --force-reset && npx tsx prisma/seed.ts && npm run dev"

volumes:
  pgdata:
  node_modules:
  next_cache:
