# Geliştirme override'ı — canlı yeniden yükleme (hot reload) için.
# Kullanım:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Kaynak bind-mount edilir ve Turbopack'li `next dev` çalışır; kod değişikliği
# anında yansır. Günlük kullanımda (hız için) sadece `docker compose up` yeterlidir
# (production build).
services:
  app:
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: sh -c "npm install && npx prisma db push && npm run dev"
